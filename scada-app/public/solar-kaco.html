<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solar KACO — Servoteh</title>
  <link rel="stylesheet" href="theme.css" />
  <style>
    /* Power Metrics grafik (lokalno) */
    .sg-metrics{padding:14px 16px 12px}
    .sg-legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
    .sg-chip{display:inline-flex;align-items:center;gap:7px;padding:5px 12px;border-radius:18px;border:1px solid var(--border);
      background:var(--panel-2);cursor:pointer;font-size:12px;font-weight:700;user-select:none}
    .sg-chip .dot{width:10px;height:10px;border-radius:50%}
    .sg-chip.off{opacity:.38}
    .sg-chartwrap{position:relative;width:100%;height:264px}
    #skChart{width:100%;height:100%;display:block}
    .sg-empty{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:13px;text-align:center;padding:0 20px}
  </style>
</head>
<body>
  <header class="t-bar">
    <div class="t-brand"><span class="t-logobox"><img class="t-logo" src="servoteh-logo.png" alt="Servoteh"></span><span class="bt">☀ SOLAR KACO</span><span class="sub">blue'Log · FNE Servoteh</span></div>
    <div class="t-right">
      <nav class="t-nav">
        <a href="/">Pregled</a>
        <a href="/kot1.html">Kotlarnica 1</a>
        <a href="/kot2.html">Kotlarnica 2</a>
        <a href="/kot3.html">Kotlarnica 3</a>
        <a href="/solar-kaco.html" class="active">Solar KACO</a>
        <a href="/solar-sigen.html">Solar Sigenergy</a>
      </nav>
      <span class="t-clock" id="clock"></span>
      <button class="t-toggle" id="themeBtn">☾ Tamna</button>
    </div>
  </header>

  <section class="statstrip" id="strip"></section>

  <div class="synwrap">
    <div class="synbox"><div id="syn"></div></div>
    <aside>
      <div class="sec-title">Invertori</div>
      <div class="cards" id="cards"></div>
      <div class="sec-title" style="margin-top:16px">Mreža · brojilo Janitza</div>
      <div class="pnl" id="meter"></div>
      <div class="sec-title" style="margin-top:16px">Rezime postrojenja</div>
      <div class="pnl" id="summary"></div>
      <div class="sec-title" style="margin-top:16px">Alarmi i status</div>
      <div class="pnl" id="alarms"></div>
    </aside>
  </div>

  <div style="padding:0 20px 24px">
    <div class="sec-title">Power Metrics — danas (kW)</div>
    <div class="pnl sg-metrics">
      <div class="sg-legend" id="skLegend"></div>
      <div class="sg-chartwrap"><canvas id="skChart"></canvas><div class="sg-empty" id="skEmpty"></div></div>
    </div>
  </div>

  <script src="hmi.js"></script>
  <script src="solar-kaco.js"></script>
</body>
</html>
